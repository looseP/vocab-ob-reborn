name: vocab-observatory-production

x-app-base: &app-base
  image: ${APP_IMAGE:?APP_IMAGE is required for production}
  init: true
  restart: unless-stopped
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=64m,mode=1777
  depends_on:
    database-role-converge:
      condition: service_completed_successfully

services:
  database-role-bootstrap:
    image: ${MIGRATION_IMAGE:?MIGRATION_IMAGE is required for production}
    init: true
    restart: "no"
    environment:
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:?DATABASE_ADMIN_URL is required for production}
      APP_DATABASE_URL: ${APP_DATABASE_URL:?APP_DATABASE_URL is required for production}
      WORKER_DATABASE_URL: ${WORKER_DATABASE_URL:?WORKER_DATABASE_URL is required for production}
      BACKUP_DATABASE_URL: ${BACKUP_DATABASE_URL:?BACKUP_DATABASE_URL is required for production}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required for production}
      DB_SSLMODE: verify-full
    command: ["./node_modules/.bin/tsx", "scripts/bootstrap-database-roles.ts", "prepare"]

  migrate:
    image: ${MIGRATION_IMAGE:?MIGRATION_IMAGE is required for production}
    init: true
    restart: "no"
    environment:
      DATABASE_URL: ${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required for production}
      DB_SSLMODE: verify-full
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      database-role-bootstrap:
        condition: service_completed_successfully
    command: ["./node_modules/.bin/drizzle-kit", "migrate", "--config", "drizzle.config.ts"]

  database-role-converge:
    image: ${MIGRATION_IMAGE:?MIGRATION_IMAGE is required for production}
    init: true
    restart: "no"
    environment:
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:?DATABASE_ADMIN_URL is required for production}
      APP_DATABASE_URL: ${APP_DATABASE_URL:?APP_DATABASE_URL is required for production}
      WORKER_DATABASE_URL: ${WORKER_DATABASE_URL:?WORKER_DATABASE_URL is required for production}
      BACKUP_DATABASE_URL: ${BACKUP_DATABASE_URL:?BACKUP_DATABASE_URL is required for production}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required for production}
      DB_SSLMODE: verify-full
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["./node_modules/.bin/tsx", "scripts/bootstrap-database-roles.ts", "converge"]

  web:
    <<: *app-base
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:?APP_DATABASE_URL is required for production}
      APP_DATABASE_URL: ${APP_DATABASE_URL:?APP_DATABASE_URL is required for production}
      NODE_ENV: production
      PORT: 3001
      SERVE_FRONTEND: "true"
      APP_ORIGIN: ${APP_ORIGIN:?APP_ORIGIN is required for production and must use HTTPS}
      OWNER_API_TOKEN: ${OWNER_API_TOKEN:?OWNER_API_TOKEN is required for production}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:?METRICS_BEARER_TOKEN is required for production}
      LOCAL_OWNER_ID: ${LOCAL_OWNER_ID:?LOCAL_OWNER_ID is required for production}
      DB_SSLMODE: verify-full
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      READINESS_TIMEOUT_MS: ${READINESS_TIMEOUT_MS:-500}
      SHUTDOWN_GRACE_MS: ${SHUTDOWN_GRACE_MS:-25000}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS:-60000}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-8}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      DATAMUSE_ENABLED: ${DATAMUSE_ENABLED:-false}
    command: ["./node_modules/.bin/tsx", "src/server.ts"]
    ports:
      - "127.0.0.1:${APP_PORT:-3001}:3001"
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 2s
      retries: 6
      start_period: 10s

  review-outbox-worker:
    <<: *app-base
    command: ["./node_modules/.bin/tsx", "scripts/run-review-outbox-worker.ts"]
    environment:
      DATABASE_URL: ${WORKER_DATABASE_URL:?WORKER_DATABASE_URL is required for production}
      DB_SSLMODE: verify-full
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
      OUTBOX_LEASE_SECONDS: ${OUTBOX_LEASE_SECONDS:-60}
      OUTBOX_SHUTDOWN_GRACE_SECONDS: ${OUTBOX_SHUTDOWN_GRACE_SECONDS:-75}
    stop_grace_period: ${OUTBOX_STOP_GRACE_PERIOD:-75s}

  llm-reservation-reaper:
    <<: *app-base
    command: ["./node_modules/.bin/tsx", "scripts/run-llm-reservation-reaper.ts"]
    environment:
      DATABASE_URL: ${WORKER_DATABASE_URL:?WORKER_DATABASE_URL is required for production}
      DB_SSLMODE: verify-full
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LLM_REAPER_POLL_INTERVAL_MS: ${LLM_REAPER_POLL_INTERVAL_MS:-5000}
      LLM_REAPER_BATCH_SIZE: ${LLM_REAPER_BATCH_SIZE:-100}
    stop_grace_period: 30s

  backup-scheduler:
    <<: *app-base
    image: ${BACKUP_IMAGE:?BACKUP_IMAGE is required for production}
    command: ["./node_modules/.bin/tsx", "scripts/run-backup-scheduler.ts"]
    environment:
      DATABASE_URL: ${BACKUP_DATABASE_URL:?BACKUP_DATABASE_URL is required for production}
      DB_SSLMODE: verify-full
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BACKUP_DIR: ${BACKUP_DIR:?BACKUP_DIR is required for production}
      BACKUP_INTERVAL_MS: ${BACKUP_INTERVAL_MS:-86400000}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
      BACKUP_SIGNING_KEY: ${BACKUP_SIGNING_KEY:?BACKUP_SIGNING_KEY is required for production}
      BACKUP_REQUIRE_SIGNING_KEY: "true"
      BACKUP_OBJECT_LOCK: ${BACKUP_OBJECT_LOCK:-true}
    volumes:
      - ${BACKUP_HOST_DIR:?BACKUP_HOST_DIR is required for production}:${BACKUP_DIR:?BACKUP_DIR is required for production}
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "test -w $${BACKUP_DIR} && pg_dump --version >/dev/null && pg_restore --version >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
