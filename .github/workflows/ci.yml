name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Engineering Gate + Migration Rehearsal
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab
      CAPACITY_TEST_CONFIRM: vocab

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vocab
          POSTGRES_PASSWORD: vocab
          POSTGRES_DB: vocab
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Pin npm version
        run: npm install --global npm@10.9.7

      - name: Install dependencies and verify lockfile
        run: npm ci

      - name: Supply-chain security gate
        run: npm run security:verify

      - name: Generate npm CycloneDX SBOM
        run: npm run sbom:npm

      - name: Upload npm SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-npm-cyclonedx
          path: sbom-npm.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Engineering verification
        run: npm run verify:engineering

      - name: Build production runtime image
        run: docker build --target runtime --tag vocab-observatory-v2:ci .

      - name: Build migration image
        run: docker build --target migration --tag vocab-observatory-v2-migration:ci .

      - name: Generate runtime image CycloneDX SBOM
        run: |
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            --volume "${PWD}:/out" \
            anchore/syft@sha256:e86b0ba0b1d2fe8a2e9f96ed9b22033df9781f43b9a7eb27c57e6c89234946bc \
            docker:vocab-observatory-v2:ci \
            --output cyclonedx-json=/out/sbom-container.cdx.json

      - name: Upload runtime image SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-container-cyclonedx
          path: sbom-container.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Verify runtime image user and production dependencies
        run: |
          test "$(docker image inspect vocab-observatory-v2:ci --format '{{.Config.User}}')" = "node"
          docker run --rm --entrypoint node vocab-observatory-v2:ci -e "const p=require('./package.json'); if(!p.dependencies.tsx) process.exit(1)"
          if docker run --rm --entrypoint node vocab-observatory-v2:ci -e "require.resolve('vitest')"; then exit 1; fi

      - name: Verify prom-client is in production image
        run: |
          docker run --rm --entrypoint node vocab-observatory-v2:ci -e "require.resolve('prom-client')"

      - name: Database release verification
        env:
          TEST_DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab
        run: npm run verify:db

      - name: Migration replay is a no-op
        run: npm run db:migrate

      - name: Data lifecycle integration and contract gate
        env:
          TEST_DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab
          DATA_LIFECYCLE_DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab
        run: npm run test:integration -- tests/repositories/data-lifecycle.integration.test.ts

      - name: Verify rollback migration compatibility
        if: github.event_name == 'pull_request'
        env:
          ROLLBACK_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: npm run release:rollback-check

      - name: Generate release manifest
        env:
          RELEASE_CANDIDATE: pr-${{ github.event.pull_request.number || github.run_number }}-${{ github.sha }}
          RUNTIME_IMAGE: vocab-observatory-v2:ci
          MIGRATION_IMAGE: vocab-observatory-v2-migration:ci
          POSTGRES_VERSION: "17"
        run: npm run release:manifest

      - name: Verify release manifest
        run: npm run release:manifest:verify

      - name: Upload release candidate evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-evidence
          path: |
            release-manifest.json
            sbom-npm.cdx.json
            sbom-container.cdx.json
          if-no-files-found: error
          retention-days: 90

  e2e:
    name: Browser E2E (Playwright)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vocab
          POSTGRES_PASSWORD: vocab
          POSTGRES_DB: vocab
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Pin npm version
        run: npm install --global npm@10.9.7

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run frontend:build

      - name: Run database migrations
        run: npm run db:migrate

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
