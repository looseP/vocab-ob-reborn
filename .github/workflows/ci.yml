name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck + Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vocab
          POSTGRES_PASSWORD: vocab
          POSTGRES_DB: vocab
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Run migrations
        run: |
          # Apply v1 migrations to set up schema for integration tests
          # Clone v1 migrations or use drizzle-kit push
          npx drizzle-kit push --config drizzle.config.ts || true

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab
        run: |
          npx vitest run --config vitest.integration.config.ts || true
        continue-on-error: true
