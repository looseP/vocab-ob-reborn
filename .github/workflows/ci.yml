name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Engineering Gate + Migration Rehearsal
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vocab
          POSTGRES_PASSWORD: vocab
          POSTGRES_DB: vocab
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Pin npm version
        run: npm install --global npm@10.9.7

      - name: Install dependencies
        run: npm ci

      - name: Engineering verification
        run: npm run verify:engineering

      - name: Database release verification
        env:
          TEST_DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab
        run: npm run verify:db

      - name: Migration replay is a no-op
        run: npm run db:migrate

  e2e:
    name: Browser E2E (Playwright)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://vocab:vocab@localhost:5432/vocab

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vocab
          POSTGRES_PASSWORD: vocab
          POSTGRES_DB: vocab
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Pin npm version
        run: npm install --global npm@10.9.7

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run frontend:build

      - name: Run database migrations
        run: npm run db:migrate

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
