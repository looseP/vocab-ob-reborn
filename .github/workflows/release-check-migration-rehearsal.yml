name: Release check - migration rehearsal

on:
  workflow_dispatch:
    inputs:
      prepare_run_id:
        description: "Same-repository successful release prepare run ID"
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_USER: vocab, POSTGRES_PASSWORD: vocab, POSTGRES_DB: vocab }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vocab -d vocab" --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql://vocab:vocab@127.0.0.1:5432/vocab
      TEST_DATABASE_URL: postgresql://vocab:vocab@127.0.0.1:5432/vocab
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false, ref: "${{ github.sha }}" }
      - uses: actions/setup-node@1e60f620b9541dca151540d0c4072c26d1eb7c64
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci --ignore-scripts
      - name: Download and verify bound prepare manifest
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}", PREPARE_RUN_ID: "${{ inputs.prepare_run_id }}", REPOSITORY: "${{ github.repository }}" }
        run: |
          set -euo pipefail
          [[ "$PREPARE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          gh api "repos/$REPOSITORY/actions/runs/$PREPARE_RUN_ID" | jq -e --arg repo "$REPOSITORY" --arg sha "$GITHUB_SHA" 'select(.status == "completed" and .conclusion == "success" and .path == ".github/workflows/release.yml" and .head_repository.full_name == $repo and .head_sha == $sha)' >/dev/null
          artifacts="$(gh api "repos/$REPOSITORY/actions/runs/$PREPARE_RUN_ID/artifacts?per_page=100")"
          [[ "$(jq -er '.total_count' <<<"$artifacts")" -le 100 ]]
          artifact_id="$(jq -er --arg name "release-$GITHUB_SHA" '[.artifacts[] | select(.name == $name)] | select(length == 1 and .[0].expired == false) | .[0].id' <<<"$artifacts")"
          mkdir prepare
          gh api "repos/$REPOSITORY/actions/artifacts/$artifact_id/zip" > prepare.zip
          unzip -q prepare.zip -d prepare
          (cd prepare && sha256sum --check release-manifest.sha256)
          echo "MANIFEST_SHA256=$(sha256sum prepare/release-manifest.json | cut -d ' ' -f 1)" >> "$GITHUB_ENV"
      - name: Run real migration rehearsal
        run: npm run db:migrate && npm run test:db-release
      - name: Build strict evidence
        run: npm run release:check:evidence -- --check migrationRehearsal --producer release-check/migration-rehearsal --release-sha "$GITHUB_SHA" --manifest-sha256 "$MANIFEST_SHA256" --observed-at "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" --output evidence.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with: { name: release-check-migration-rehearsal, path: evidence.json, if-no-files-found: error, retention-days: 90 }
