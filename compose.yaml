name: vocab-observatory

x-app-environment: &app-environment
  DATABASE_URL: ${APP_DATABASE_URL:-postgresql://vocab_app:LocalVocabApp_7rN3zM4c@postgres:5432/${POSTGRES_DB:-vocab}}
  DB_SSLMODE: ${DB_SSLMODE:-disable}
  DB_POOL_MAX: ${DB_POOL_MAX:-5}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-database-role-environment: &database-role-environment
  # Preserve the historical local admin identity so existing postgres-data volumes remain upgradeable.
  DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:-postgresql://${POSTGRES_USER:-vocab}:${POSTGRES_PASSWORD:-vocab}@postgres:5432/${POSTGRES_DB:-vocab}}
  APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql://vocab_app:LocalVocabApp_7rN3zM4c@postgres:5432/${POSTGRES_DB:-vocab}}
  WORKER_DATABASE_URL: ${WORKER_DATABASE_URL:-postgresql://vocab_worker:LocalVocabWorker_4xV9pC@postgres:5432/${POSTGRES_DB:-vocab}}
  BACKUP_DATABASE_URL: ${BACKUP_DATABASE_URL:-postgresql://vocab_backup:LocalVocabBackup_6kT2yH@postgres:5432/${POSTGRES_DB:-vocab}}
  MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:-postgresql://vocab_migration:LocalVocabMigration_5mJ8qD@postgres:5432/${POSTGRES_DB:-vocab}}
  DB_SSLMODE: ${DB_SSLMODE:-disable}

x-app-base: &app-base
  image: ${APP_IMAGE:-vocab-observatory-v2:local}
  build:
    context: .
    target: runtime
  init: true
  restart: unless-stopped
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=64m,mode=1777
  environment: *app-environment
  depends_on:
    database-role-converge:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vocab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vocab}
      POSTGRES_DB: ${POSTGRES_DB:-vocab}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  database-role-bootstrap:
    image: ${MIGRATION_IMAGE:-vocab-observatory-v2-migration:local}
    build:
      context: .
      target: migration
    init: true
    restart: "no"
    environment: *database-role-environment
    depends_on:
      postgres:
        condition: service_healthy
    command: ["./node_modules/.bin/tsx", "scripts/bootstrap-database-roles.ts", "prepare"]

  migrate:
    image: ${MIGRATION_IMAGE:-vocab-observatory-v2-migration:local}
    build:
      context: .
      target: migration
    init: true
    restart: "no"
    environment:
      <<: *app-environment
      DATABASE_URL: ${MIGRATION_DATABASE_URL:-postgresql://vocab_migration:LocalVocabMigration_5mJ8qD@postgres:5432/${POSTGRES_DB:-vocab}}
    depends_on:
      database-role-bootstrap:
        condition: service_completed_successfully
    command: ["./node_modules/.bin/drizzle-kit", "migrate", "--config", "drizzle.config.ts"]

  database-role-converge:
    image: ${MIGRATION_IMAGE:-vocab-observatory-v2-migration:local}
    build:
      context: .
      target: migration
    init: true
    restart: "no"
    environment: *database-role-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["./node_modules/.bin/tsx", "scripts/bootstrap-database-roles.ts", "converge"]

  web:
    <<: *app-base
    environment:
      <<: *app-environment
      NODE_ENV: ${APP_NODE_ENV:-development}
      PORT: 3001
      SERVE_FRONTEND: "true"
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql://vocab_app:LocalVocabApp_7rN3zM4c@postgres:5432/${POSTGRES_DB:-vocab}}
      APP_ORIGIN: ${APP_ORIGIN:-http://127.0.0.1:${APP_PORT:-3001}}
      # Local-only examples; production overrides must supply real secrets.
      OWNER_API_TOKEN: ${OWNER_API_TOKEN:-local-owner-api-token-only-0001}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-}
      LOCAL_OWNER_ID: ${LOCAL_OWNER_ID:-00000000-0000-4000-8000-000000000001}
      READINESS_TIMEOUT_MS: ${READINESS_TIMEOUT_MS:-500}
      SHUTDOWN_GRACE_MS: ${SHUTDOWN_GRACE_MS:-25000}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS:-60000}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-8}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      DATAMUSE_ENABLED: ${DATAMUSE_ENABLED:-false}
    command: ["./node_modules/.bin/tsx", "src/server.ts"]
    ports:
      - "127.0.0.1:${APP_PORT:-3001}:3001"
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 2s
      retries: 6
      start_period: 10s

  review-outbox-worker:
    <<: *app-base
    command: ["./node_modules/.bin/tsx", "scripts/run-review-outbox-worker.ts"]
    environment:
      <<: *app-environment
      DATABASE_URL: ${WORKER_DATABASE_URL:-postgresql://vocab_worker:LocalVocabWorker_4xV9pC@postgres:5432/${POSTGRES_DB:-vocab}}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
      OUTBOX_LEASE_SECONDS: ${OUTBOX_LEASE_SECONDS:-60}
      OUTBOX_SHUTDOWN_GRACE_SECONDS: ${OUTBOX_SHUTDOWN_GRACE_SECONDS:-75}
    stop_grace_period: ${OUTBOX_STOP_GRACE_PERIOD:-75s}

  llm-reservation-reaper:
    <<: *app-base
    command: ["./node_modules/.bin/tsx", "scripts/run-llm-reservation-reaper.ts"]
    environment:
      <<: *app-environment
      DATABASE_URL: ${WORKER_DATABASE_URL:-postgresql://vocab_worker:LocalVocabWorker_4xV9pC@postgres:5432/${POSTGRES_DB:-vocab}}
      LLM_REAPER_POLL_INTERVAL_MS: ${LLM_REAPER_POLL_INTERVAL_MS:-5000}
      LLM_REAPER_BATCH_SIZE: ${LLM_REAPER_BATCH_SIZE:-100}
    stop_grace_period: 30s

  backup-scheduler:
    <<: *app-base
    image: ${BACKUP_IMAGE:-vocab-observatory-v2-backup:local}
    # On POSIX hosts, set this to the host UID:GID when bind-mounting backups.
    user: ${BACKUP_RUNTIME_USER:-node}
    build:
      context: .
      target: backup-runtime
      args:
        POSTGRES_CLIENT_MAJOR: ${POSTGRES_CLIENT_MAJOR:-17}
    command: ["./node_modules/.bin/tsx", "scripts/run-backup-scheduler.ts"]
    environment:
      <<: *app-environment
      DATABASE_URL: ${BACKUP_DATABASE_URL:-postgresql://vocab_backup:LocalVocabBackup_6kT2yH@postgres:5432/${POSTGRES_DB:-vocab}}
      BACKUP_DIR: ${BACKUP_DIR:-/backups}
      BACKUP_INTERVAL_MS: ${BACKUP_INTERVAL_MS:-86400000}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
      # Local-only example; production overlay requires an external secret.
      BACKUP_SIGNING_KEY: ${BACKUP_SIGNING_KEY:-local-backup-signing-key-only-0001}
      BACKUP_REQUIRE_SIGNING_KEY: ${BACKUP_REQUIRE_SIGNING_KEY:-true}
      BACKUP_OBJECT_LOCK: ${BACKUP_OBJECT_LOCK:-true}
    volumes:
      - ${BACKUP_HOST_DIR:-./backups}:/backups
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_dump --version >/dev/null && pg_restore --version >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  data-lifecycle:
    image: ${APP_IMAGE:-vocab-observatory-v2:local}
    build:
      context: .
      target: runtime
    profiles: ["data-lifecycle"]
    init: true
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      DATA_LIFECYCLE_DATABASE_URL: ${DATA_LIFECYCLE_DATABASE_URL:-}
      DATA_LIFECYCLE_CUTOFF: ${DATA_LIFECYCLE_CUTOFF:-}
      DATA_LIFECYCLE_CONFIRM_CUTOFF: ${DATA_LIFECYCLE_CONFIRM_CUTOFF:-}
      DATA_LIFECYCLE_CONFIRM: ${DATA_LIFECYCLE_CONFIRM:-}
      DATA_LIFECYCLE_ALLOW_WRITE: ${DATA_LIFECYCLE_ALLOW_WRITE:-}
      DATA_LIFECYCLE_ENVIRONMENT: ${DATA_LIFECYCLE_ENVIRONMENT:-}
      DATA_LIFECYCLE_PRODUCTION_CONFIRM: ${DATA_LIFECYCLE_PRODUCTION_CONFIRM:-}
      DATA_LIFECYCLE_OUTBOX_PROCESSED_DAYS: ${DATA_LIFECYCLE_OUTBOX_PROCESSED_DAYS:-30}
      DATA_LIFECYCLE_AUTH_SESSION_DAYS: ${DATA_LIFECYCLE_AUTH_SESSION_DAYS:-30}
      DATA_LIFECYCLE_LLM_TERMINAL_DAYS: ${DATA_LIFECYCLE_LLM_TERMINAL_DAYS:-30}
      DATA_LIFECYCLE_LLM_SETTLED_DAYS: ${DATA_LIFECYCLE_LLM_SETTLED_DAYS:-400}
      DATA_LIFECYCLE_REVIEW_LOG_DAYS: ${DATA_LIFECYCLE_REVIEW_LOG_DAYS:-365}
      DATA_LIFECYCLE_BATCH_SIZE: ${DATA_LIFECYCLE_BATCH_SIZE:-250}
      DATA_LIFECYCLE_MAX_BATCHES: ${DATA_LIFECYCLE_MAX_BATCHES:-100}
      DATA_LIFECYCLE_MAX_ROWS: ${DATA_LIFECYCLE_MAX_ROWS:-25000}
      DATA_LIFECYCLE_LOCK_TIMEOUT_MS: ${DATA_LIFECYCLE_LOCK_TIMEOUT_MS:-2000}
      DATA_LIFECYCLE_STATEMENT_TIMEOUT_MS: ${DATA_LIFECYCLE_STATEMENT_TIMEOUT_MS:-30000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      database-role-converge:
        condition: service_completed_successfully
    command: ["./node_modules/.bin/tsx", "scripts/run-data-lifecycle.ts"]

volumes:
  postgres-data:
  backups:
